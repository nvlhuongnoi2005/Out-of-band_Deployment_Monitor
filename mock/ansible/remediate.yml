---
# FR-12: Auto-Remediation Playbook
# Triggered by oob-central when UNAUTHORIZED_DRIFT is detected.
#
# Variables passed by AnsibleTrigger:
#   drift_server  — server where the unauthorized change occurred
#   drift_project — project name
#   drift_path    — absolute path of the changed file
#   drift_event   — event type (CREATE / MODIFY / DELETE / ATTRIB)
#
# Usage (manual test):
#   ansible-playbook mock/ansible/remediate.yml \
#     -i mock/ansible/inventory \
#     --limit local-demo \
#     -e "drift_server=local-demo drift_project=webapp drift_path=/tmp/demo-prod-app/config/app.json drift_event=MODIFY"

- name: OOB Auto-Remediation
  hosts: "{{ drift_server | default('local-demo') }}"
  gather_facts: false

  vars:
    remediation_log: /tmp/oob-remediation.log

  tasks:
    - name: Log remediation start
      lineinfile:
        path: "{{ remediation_log }}"
        line: >-
          {{ lookup('pipe', 'date --iso-8601=seconds') }}
          DRIFT_DETECTED server={{ drift_server }}
          path={{ drift_path }} event={{ drift_event }}
        create: yes
        mode: '0644'

    - name: Remove unauthorized file (CREATE event)
      file:
        path: "{{ drift_path }}"
        state: absent
      when: drift_event == "CREATE"
      ignore_errors: yes

    - name: Restore file from last known-good state (MODIFY / DELETE event)
      shell: |
        if git -C /tmp/demo-prod-app rev-parse --is-inside-work-tree &>/dev/null; then
          git -C /tmp/demo-prod-app checkout HEAD -- "{{ drift_path }}"
          echo "restored via git"
        else
          echo "no git repo — manual restore required"
        fi
      when: drift_event in ["MODIFY", "DELETE"]
      register: restore_result
      ignore_errors: yes

    - name: Revert permission change (ATTRIB event)
      file:
        path: "{{ drift_path }}"
        mode: '0644'
      when: drift_event == "ATTRIB"
      ignore_errors: yes

    - name: Log remediation complete
      lineinfile:
        path: "{{ remediation_log }}"
        line: >-
          {{ lookup('pipe', 'date --iso-8601=seconds') }}
          REMEDIATED server={{ drift_server }} path={{ drift_path }}
        create: yes
        mode: '0644'

    - name: Print summary
      debug:
        msg: "Remediation complete for {{ drift_path }} on {{ drift_server }}"
